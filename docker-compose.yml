version: '3.8'

services:
  bot:
    image: ghcr.io/peterpage2115/travianbot:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Hardcoded database URL - always use the db service
      DATABASE_URL: postgresql://travianbot:changeme@db:5432/travianbot_prod
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - travianbot-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: travianbot
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: travianbot_prod
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travianbot -d travianbot_prod']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travianbot-network

volumes:
  postgres-data:

networks:
  travianbot-network:
    driver: bridge
