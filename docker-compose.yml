version: '3.8'

services:
  bot:
    image: ghcr.io/peterpage2115/travianbot:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - travianbot-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-travianbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-travianbot_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-travianbot} -d ${DB_NAME:-travianbot_prod}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travianbot-network

volumes:
  postgres-data:

networks:
  travianbot-network:
    driver: bridge
